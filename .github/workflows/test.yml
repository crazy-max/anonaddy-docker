name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
  pull_request:

env:
  BUILD_TAG: addy:test
  CONTAINER_NAME: addy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      -
        name: Build
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          source: .
          targets: image-local
        env:
          DEFAULT_TAG: ${{ env.BUILD_TAG }}
      -
        name: Generate DKIM private key
        run: |
          docker compose run --rm gen-dkim
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Start
        run: |
          docker compose up -d
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@46267a6e61cd56aac2fc79943df180152f4c89d6 # v1.10.1
        with:
          name: ${{ env.CONTAINER_NAME }}
          log_check: "ready to handle connections"
          timeout: 120
      -
        name: Logs
        if: always()
        run: |
          docker compose logs
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
